<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Landing</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- BANNER -->
  <div class="banner">
    <div class="container">
      <h1>My Startup Project</h1>
      <h2>A clean and responsive website using reusable components</h2>
      <a href="#form-section" class="btn-blue">Discover</a>
    </div>
  </div>

  <!-- CARDS SECTION -->
  <div class="container" id="campuses">
    <h2>Our campuses</h2>

    <div class="cards">

      <a href="#form-section" class="card">
        <img src="images/shanghai.jpg" alt="Shanghai">
        <h3>Shanghai</h3>
      </a>

      <a href="#form-section" class="card">
        <img src="images/paris.jpg" alt="Paris">
        <h3>Paris</h3>
      </a>

      <a href="#form-section" class="card">
        <img src="images/rio.jpg" alt="Rio">
        <h3>Rio</h3>
      </a>

    </div>
  </div>

  <!-- FORM SECTION -->
  <div class="container" id="form-section">
    <div class="form-box">
      <h2>Join us</h2>
      <p>Fill in your personal information below.</p>

      <form>
        <div class="form-group">
          <label for="firstname">First name</label>
          <input type="text" id="firstname" name="firstname" placeholder="Enter your first name">
        </div>

        <div class="form-group">
          <label for="lastname">Last name</label>
          <input type="text" id="lastname" name="lastname" placeholder="Enter your last name">
        </div>

        <div class="form-group">
          <label for="age">Age</label>
          <input type="number" id="age" name="age" placeholder="Enter your age">
        </div>

        <button type="submit" class="btn-blue">Send</button>
      </form>
    </div>
  </div>

</body>
</html>
